services:
  - type: web
    name: theresse-food-menu
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health
